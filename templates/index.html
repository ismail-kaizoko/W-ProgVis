<!doctype html>
<html>
  <head>
    <title>Life Evolution Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        Welcome, <strong>{{ username }}</strong>
      </div>
      <div class="topbar-actions">
        <button class="btn-plus topbar-add-button" type="button" onclick="openAddWidgetModal()">
          + Add Graphic
        </button>
        <a href="/logout" class="logout-link">Logout</a>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero">
        <h1>Life Evolution Tracker</h1>
        <p>Start with an empty dashboard, then add the graphics you want from the top-right button.</p>
      </section>

      <section id="empty-state" class="empty-state" hidden>
        <h2>Your dashboard is empty</h2>
        <p>Use the top-right Add Graphic button to create your first chart.</p>
      </section>

      <section id="dashboard" class="dashboard-row"></section>
    </main>

    <div id="widget-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="widget-modal-title">Add Graphic</h2>
          <button class="modal-close" type="button" onclick="closeWidgetModal()">x</button>
        </div>
        <form id="widget-form">
          <div id="widget-form-content"></div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" onclick="closeWidgetModal()">Cancel</button>
            <button type="submit" class="btn-plus">Create Graphic</button>
          </div>
          <p id="widget-form-error" class="form-error" hidden></p>
        </form>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
